[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe

[Output]
Format=disk
ImageId=privasys-tdx-base
ImageVersion=0.1.0
CompressOutput=false

[Content]
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # GCP guest agent and drivers
    google-compute-engine
    google-guest-agent

    # Kernel (GCP-flavoured: TDX + SEV guest support, gVNIC, NVMe)
    linux-image-gcp

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-tdx

[Validation]
Verity=hash
