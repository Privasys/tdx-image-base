[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe,restricted

[Output]
Format=disk
ImageId=privasys-sev-snp-gpu
ImageVersion=0.1.0
CompressOutput=false

[Content]
ExtraTrees=../../common/mkosi.extra/
PackageManagerTrees=mkosi.pkgmanager
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # GCP guest agent and drivers
    google-compute-engine
    google-guest-agent

    # Kernel - HWE (Hardware Enablement) 6.19, cloud-agnostic.
    linux-image-generic-hwe-24.04

    # ── NVIDIA Confidential Computing ──

    # NVIDIA driver 550 with CC (Confidential Computing) mode support.
    # Headless GPU compute on VMs.
    nvidia-driver-550
    nvidia-utils-550

    # NVLink fabric manager for multi-GPU (A3 / H100 SXM) topologies.
    nvidia-fabricmanager-550

    # NVIDIA container runtime integration for containerd/Docker.
    # Provides nvidia-container-runtime-hook and libnvidia-container.
    nvidia-container-toolkit

    # CUDA 12.6 toolkit - required for inference runtimes (TensorRT, vLLM).
    # This pulls in libcudart, nvcc, and the full CUDA runtime.
    cuda-toolkit-12-6

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-sev-snp-gpu

[Validation]
Verity=hash
