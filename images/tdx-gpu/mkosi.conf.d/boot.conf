[Content]
Packages=
    # Secure Boot chain: shim-signed (Microsoft-signed) -> grubx64.efi
    # (Canonical-signed). mkosi uses these pre-signed binaries directly,
    # skipping grub-mkimage entirely. This gives:
    #   UEFI Secure Boot -> shimx64.efi -> grubx64.efi -> kernel
    grub-efi-amd64-signed
    shim-signed

Bootable=enabled
Bootloader=grub
ShimBootloader=signed

KernelCommandLine=
    console=ttyS0,115200n8
    iommu=pt
    intel_iommu=on
    nvidia.NVreg_ConfidentialComputing=1
    acpi_no_initrd_table_override
    # NOTE: lockdown=integrity and module.sig_enforce=1 are intentionally
    # disabled until the patched NVIDIA CC modules are signed with a key
    # the kernel trusts. The CC bring-up at /usr/lib/cvm-runtime-init/
    # loads /data/nvidia-cc-bundle/modules/nvidia*.ko which are unsigned;
    # with lockdown=integrity the insmod fails ("Key was rejected by
    # service") and the GPU never comes up. See:
    # .operations/know-how/tdx-nvidia-cc.md (Secure Boot section)
    # TODO restore both flags once nvidia-cc-bundle ships signed modules
    # signed with a key in the .builtin_trusted_keys ring.
