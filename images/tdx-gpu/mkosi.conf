[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe,restricted

[Output]
Format=disk
ImageId=privasys-tdx-gpu
ImageVersion=0.1.0
CompressOutput=false
RepartOffline=no

[Content]
ExtraTrees=../../common/mkosi.extra/
PackageManagerTrees=mkosi.pkgmanager
PrepareScripts=mkosi.prepare
PostInstallationScripts=mkosi.postinst.chroot
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # Kernel - HWE (Hardware Enablement), cloud-agnostic.
    # TDX guest support included since 6.2. The HWE meta-package
    # tracks the latest LTS-backported kernel on Noble.
    linux-image-generic-hwe-24.04

    # -- NVIDIA Confidential Computing (TDX + H100) --

    # Pre-built Canonical-signed OPEN SERVER kernel modules for nvidia-590.
    # The "server-open" variant is required for Confidential Computing
    # (CC) mode on datacenter GPUs (H100, A100, etc.) in TDX/SEV-SNP
    # VMs.  Built from nvidia-graphics-drivers-590-server (separate
    # source package from the desktop nvidia-graphics-drivers-590), it
    # includes GSP firmware and PCI ID support for GH100 and CC mode.
    linux-modules-nvidia-590-server-open-generic-hwe-24.04

    # NVIDIA open server driver 590 with CC (Confidential Computing).
    nvidia-driver-590-server-open
    nvidia-utils-590-server

    # NVIDIA container runtime integration for containerd/Docker.
    # Provides nvidia-container-runtime-hook and libnvidia-container.
    nvidia-container-toolkit

    # CUDA 13 toolkit - required for inference runtimes (vLLM).
    # Pulls in libcudart, nvcc, and the full CUDA runtime.
    cuda-toolkit-13-0

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-tdx-gpu

[Validation]
Verity=hash
