[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe

[Output]
Format=disk
ImageId=privasys-sev-snp-base
ImageVersion=0.1.0
CompressOutput=false

[Content]
ExtraTrees=../../common/mkosi.extra/
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # Kernel - HWE (Hardware Enablement) 6.19, cloud-agnostic.
    # TDX + SEV guest support included since 6.7. The HWE meta-package
    # tracks the latest LTS-backported kernel on Noble.
    linux-image-generic-hwe-24.04

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-sev-snp

[Validation]
Verity=hash
