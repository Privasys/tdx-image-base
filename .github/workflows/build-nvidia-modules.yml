name: Build NVIDIA CC Modules

on:
  push:
    tags: ['nvidia-cc-v*', 'nvidia-cc-nopatch-v*']
  workflow_dispatch:
    inputs:
      no_perf_patches:
        description: 'Skip perf patches 0001 and 0002 (bounce-buffer benchmark build)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build TDX CC patched NVIDIA modules
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Build patched modules
        env:
          NO_PERF_PATCHES: ${{ (startsWith(github.ref, 'refs/tags/nvidia-cc-nopatch-v') || github.event.inputs.no_perf_patches == 'true') && '1' || '0' }}
        run: |
          sudo -E ./build-nvidia-modules.sh --output-dir "${{ github.workspace }}/nvidia-cc-bundle"
          echo "### NVIDIA CC Module Bundle" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat nvidia-cc-bundle/BUILD-INFO >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -lh nvidia-cc-bundle/modules/*.ko >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-cc-bundle${{ (startsWith(github.ref, 'refs/tags/nvidia-cc-nopatch-v') || github.event.inputs.no_perf_patches == 'true') && '-nopatch' || '' }}
          path: |
            nvidia-cc-bundle*.tar.gz
            nvidia-cc-bundle/BUILD-INFO
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/nvidia-cc-v') || startsWith(github.ref, 'refs/tags/nvidia-cc-nopatch-v')
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-cc-bundle*.tar.gz
          generate_release_notes: true
