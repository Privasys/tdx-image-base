name: Build SEV-SNP Base Image

on:
  push:
    branches: [main]
    tags: ['sev-snp-base-v*']
  pull_request:
    branches: [main]
    paths:
      - 'images/sev-snp-base/**'
      - 'common/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build SEV-SNP base image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mkosi
        run: |
          sudo pip3 install git+https://github.com/systemd/mkosi.git@v26 --break-system-packages

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            systemd-container bubblewrap \
            systemd-ukify systemd-boot-efi \
            mtools dosfstools e2fsprogs squashfs-tools \
            cryptsetup erofs-utils \
            pesign sbsigntool debootstrap systemd-boot

      - name: Recreate symlinks
        run: |
          # Git on the CI runner may check out symlink files as plain text.
          # Recreate them as real symlinks so mkosi overlays work correctly.
          cd common/mkosi.extra/etc/systemd/system

          for f in multi-user.target.wants/systemd-networkd.service \
                   sockets.target.wants/systemd-networkd.socket \
                   sysinit.target.wants/systemd-networkd-wait-online.service; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f")
              rm "$f"
              ln -s "$target" "$f"
            fi
          done

          cd ../../../../..
          f=common/mkosi.extra/etc/resolv.conf
          if [ -f "$f" ] && [ ! -L "$f" ]; then
            target=$(cat "$f")
            rm "$f"
            ln -s "$target" "$f"
          fi

      - name: Build image
        run: |
          cd images/sev-snp-base
          sudo mkosi build

      - name: Verify partitions
        run: |
          RAW=$(ls images/sev-snp-base/privasys-sev-snp-base_*.raw)
          sudo fdisk -l "$RAW"
          echo "---"
          ls -lh "$RAW"

      - name: Package for cloud
        if: startsWith(github.ref, 'refs/tags/sev-snp-base-v')
        run: |
          cp images/sev-snp-base/privasys-sev-snp-base_*.raw disk.raw
          tar -czf privasys-sev-snp-base-${{ github.ref_name }}.tar.gz disk.raw
          rm disk.raw

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/sev-snp-base-v')
        uses: softprops/action-gh-release@v2
        with:
          files: privasys-sev-snp-base-*.tar.gz
          generate_release_notes: true
          make_latest: false
